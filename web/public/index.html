<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Sleeping My Love</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sleeping My Love">
<meta name="theme-color" content="#0b0a1e">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  :root{
    --pink:#ff6f9c; --purple:#8b6cff; --gold:#ffcf7a; --green:#6ee7b7;
    --txt:#f3eefb; --dim:#a99fc7;
    --glass:rgba(255,255,255,.055); --line:rgba(255,255,255,.11);
    --serif:ui-serif,"New York",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  }
  html{height:auto}
  body{
    font-family:var(--sans); color:var(--txt); position:relative;
    background:radial-gradient(125% 80% at 50% -12%, #2a1f55 0%, #15123a 40%, #0b0a1e 100%) fixed;
    min-height:100dvh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:max(env(safe-area-inset-top),22px) 22px max(env(safe-area-inset-bottom),26px);
    display:flex; flex-direction:column;
  }
  .stars,.stars::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1.4px 1.4px at 20% 28%,#ffffffcc,transparent),
      radial-gradient(1.2px 1.2px at 72% 18%,#ffffff99,transparent),
      radial-gradient(1px 1px at 42% 58%,#ffffffaa,transparent),
      radial-gradient(1.3px 1.3px at 85% 48%,#ffffff88,transparent),
      radial-gradient(1px 1px at 14% 74%,#ffffff99,transparent),
      radial-gradient(1px 1px at 62% 82%,#ffffff88,transparent),
      radial-gradient(1.3px 1.3px at 90% 80%,#ffffffaa,transparent);
    animation:twinkle 5s ease-in-out infinite;
  }
  .stars::after{animation-delay:2.5s;opacity:.4}
  @keyframes twinkle{0%,100%{opacity:.45}50%{opacity:.95}}

  .wrap{position:relative;z-index:1;display:flex;flex-direction:column;flex:1 0 auto;max-width:430px;margin:0 auto;width:100%}

  header{text-align:center;padding:2px 0}
  .moon{
    width:128px;height:128px;margin:0 auto;border-radius:50%;position:relative;
    background:radial-gradient(circle at 38% 32%,#3a2f6e,#1a1640 72%);
    box-shadow:0 0 52px -10px rgba(168,140,255,.55),inset 0 0 34px rgba(255,255,255,.05);
    display:flex;align-items:center;justify-content:center;animation:float 6s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  #catAnim{width:118px;height:118px}
  h1{font-family:var(--serif);font-style:italic;font-weight:600;font-size:27px;
     letter-spacing:.2px;margin-top:12px;color:#fdf6ff}
  .sub{color:var(--dim);font-size:13px;margin-top:6px;letter-spacing:.3px;font-weight:450}

  .status{
    margin:20px 0 18px;padding:20px;border-radius:26px;text-align:center;transition:.5s;
    background:var(--glass);border:1px solid var(--line);
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    box-shadow:0 8px 40px -14px rgba(0,0,0,.55);
  }
  .ring{
    width:64px;height:64px;border-radius:50%;margin:0 auto 14px;position:relative;
    display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);transition:.5s;
  }
  .ring::before{content:"";position:absolute;inset:-6px;border-radius:50%;opacity:.5;filter:blur(10px);transition:.5s}
  .ring svg{width:28px;height:28px;position:relative;z-index:1}
  .status.open   .ring::before{background:var(--green)}
  .status.open   .ring{color:var(--green)}
  .status.locked .ring::before{background:var(--pink);animation:pulse 1.9s ease-in-out infinite}
  .status.locked .ring{color:#ffd0e0}
  .status.snooze .ring::before{background:var(--gold)}
  .status.snooze .ring{color:var(--gold)}
  @keyframes pulse{0%,100%{opacity:.32;transform:scale(.94)}50%{opacity:.68;transform:scale(1.1)}}
  .status .big{font-size:19px;font-weight:650;letter-spacing:.2px}
  .clock{font-family:var(--serif);font-size:30px;font-weight:500;margin-top:6px;letter-spacing:1px;
         color:#fff;font-variant-numeric:tabular-nums}
  .winline{color:var(--dim);font-size:11.5px;margin-top:5px;letter-spacing:.5px;text-transform:uppercase;opacity:.8}
  /* snooze info pill */
  .snoozebox{
    margin-top:13px;padding:11px 14px;border-radius:14px;display:inline-flex;flex-direction:column;gap:2px;
    background:rgba(255,207,122,.1);border:1px solid rgba(255,207,122,.28);
  }
  .snoozebox .u{color:var(--gold);font-size:14px;font-weight:600}
  .snoozebox .r{color:rgba(255,207,122,.7);font-size:11.5px;font-variant-numeric:tabular-nums}

  .btns{display:flex;flex-direction:column;gap:12px}
  button{
    border:none;border-radius:18px;padding:17px;font-size:16px;font-weight:600;
    color:#fff;font-family:var(--sans);cursor:pointer;position:relative;
    transition:transform .12s cubic-bezier(.2,.8,.2,1),opacity .3s;
    display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:.2px;
  }
  button svg{width:20px;height:20px;flex:none}
  button:active{transform:scale(.965)}
  button:disabled{opacity:.45}
  .b-lock{background:linear-gradient(118deg,#ff6f9c,#a06bff);box-shadow:0 12px 32px -10px rgba(255,111,156,.55)}
  .b-unlock{background:rgba(255,255,255,.07);border:1px solid var(--line)}
  .b-snooze{background:rgba(255,207,122,.12);border:1px solid rgba(255,207,122,.35);color:var(--gold)}
  .b-ghost{background:transparent;color:var(--dim);font-size:13.5px;font-weight:500;padding:11px;letter-spacing:.3px}

  .pair-card{
    margin-top:26px;padding:28px 24px;border-radius:26px;text-align:center;
    background:var(--glass);border:1px solid var(--line);
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  }
  .pair-card p{color:var(--dim);font-size:14px;margin-bottom:20px;line-height:1.6}
  .pin{
    width:100%;font-size:30px;text-align:center;letter-spacing:14px;text-indent:14px;padding:17px;
    background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:16px;color:#fff;
    margin-bottom:18px;font-family:var(--sans);font-weight:700;
  }
  .pin:focus{outline:none;border-color:var(--pink)}

  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 32px);transform:translateX(-50%) translateY(18px);
    background:rgba(28,23,52,.96);color:#fff;padding:13px 22px;border-radius:14px;font-size:14px;
    border:1px solid var(--line);backdrop-filter:blur(10px);
    opacity:0;transition:.35s cubic-bezier(.2,.9,.2,1);pointer-events:none;max-width:86%;text-align:center;z-index:10;
    box-shadow:0 12px 40px -12px rgba(0,0,0,.6)
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .pinwarn{
    margin-bottom:14px;padding:12px 15px;border-radius:14px;font-size:13px;line-height:1.5;
    background:rgba(255,111,156,.12);border:1px solid rgba(255,111,156,.35);color:#ffc2d4;
    text-align:center;cursor:pointer;
  }
  .hidden{display:none!important}
  .spacer{flex:0 0 auto;height:14px}
  footer{text-align:center;color:var(--dim);font-size:10.5px;opacity:.65;padding-top:16px;letter-spacing:.4px}
  .fade{animation:fade .55s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="stars"></div>

<!-- icon sprite -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <g id="i-moon" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
    </g>
    <g id="i-sun" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
    </g>
    <g id="i-stars" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3l1.6 3.8L17.5 8l-3.9 1.2L12 13l-1.6-3.8L6.5 8l3.9-1.2z"/>
      <path d="M18.5 14l.7 1.7 1.8.6-1.8.6-.7 1.7-.7-1.7-1.8-.6 1.8-.6z"/>
    </g>
  </defs>
</svg>

<div class="wrap">
  <header class="fade">
    <div class="moon"><div id="catAnim"></div></div>
    <h1>Sleeping My Love</h1>
    <div class="sub">biar sayang cukup istirahat</div>
  </header>

  <!-- PAIRING -->
  <div id="pairView" class="hidden">
    <div class="pair-card fade">
      <p>Sambungin HP ini dulu.<br>Masukin PIN dari Mac:</p>
      <input id="pinInput" class="pin" type="tel" inputmode="numeric" maxlength="6" placeholder="••••">
      <button class="b-lock" onclick="doPair()">Sambungkan</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="mainView" class="hidden">
    <div id="pinWarn" class="pinwarn hidden" onclick="changePin()">
      ⚠︎ Masih pakai PIN default (1111). Tap untuk ganti PIN rahasia.
    </div>
    <div id="statusCard" class="status open fade">
      <div class="ring" id="ring"><svg><use href="#i-sun"/></svg></div>
      <div class="big" id="statusText">Memuat…</div>
      <div id="metaBox"></div>
    </div>

    <div class="btns">
      <button class="b-lock"   onclick="act('lock','Menidurkan sayang…')"><svg><use href="#i-moon"/></svg>Tidur Sayang</button>
      <button class="b-unlock" onclick="act('unlock','Boleh kerja dulu…')"><svg><use href="#i-sun"/></svg>Boleh Kerja</button>
      <button class="b-snooze" onclick="izinBegadang()"><svg><use href="#i-stars"/></svg>Izin Begadang</button>
      <button class="b-ghost"  onclick="act('snooze_off','Yaudah jangan begadang…')">Jangan Begadang</button>
    </div>

    <div class="spacer"></div>
    <button class="b-ghost" onclick="changePin()">ganti PIN rahasia · logout device lain</button>
    <footer>cuma HP ini yang tersambung</footer>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/lottie.min.js"></script>
<script>
let catAnim=null;
try{ catAnim=lottie.loadAnimation({container:document.getElementById("catAnim"),renderer:"svg",loop:true,autoplay:true,path:"/cat.json"}); }
catch(e){ const c=document.getElementById("catAnim"); c.textContent="🐱"; c.style.cssText="font-size:60px;line-height:94px"; }
// Hemat CPU: pause animasi + polling pas tab/app ga keliatan.
let pollTimer=null;
function startPolling(){ if(!pollTimer) pollTimer=setInterval(()=>{if(window.token)refresh();},3000); }
function stopPolling(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} }
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){ catAnim&&catAnim.pause(); stopPolling(); }
  else { catAnim&&catAnim.play(); if(window.token){refresh();startPolling();} }
});
</script>
<script>
const TOKEN_KEY="turublok_token";
let token=localStorage.getItem(TOKEN_KEY);
window.token=token;
const $=id=>document.getElementById(id);
function show(v){$("pairView").classList.toggle("hidden",v!=="pair");$("mainView").classList.toggle("hidden",v!=="main");}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400);}
function haptic(){if(navigator.vibrate)navigator.vibrate(8);}
function icon(id){return `<svg><use href="#${id}"/></svg>`;}

async function api(path,opts={}){
  opts.headers=Object.assign({"X-Token":token||"","Content-Type":"application/json"},opts.headers||{});
  const r=await fetch(path,opts);
  if(r.status===401){localStorage.removeItem(TOKEN_KEY);token=null;window.token=null;stopPolling();show("pair");toast("Sesi berakhir — PIN diganti, pair ulang");throw new Error("unauthorized");}
  return r.json();
}
async function doPair(){
  const pin=$("pinInput").value.trim(); if(!pin)return; haptic();
  try{
    const r=await fetch("/api/pair",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin})}).then(x=>x.json());
    if(r.ok&&r.token){token=r.token;window.token=token;localStorage.setItem(TOKEN_KEY,token);show("main");refresh();startPolling();toast("Tersambung");}
    else toast(r.error||"PIN salah");
  }catch(e){toast("Gagal nyambung ke Mac");}
}
async function act(action,msg){
  haptic();toast(msg);
  try{const r=await api("/api/"+action,{method:"POST"});if(r.msg)toast(r.msg);setTimeout(refresh,500);}
  catch(e){if(e.message!=="unauthorized")toast("Gagal — Mac nyala & sejaringan?");}
}
async function izinBegadang(){
  const t=prompt("Boleh begadang sampai jam berapa?\n(format 24 jam, contoh: 02:00)");
  if(!t)return;
  if(!/^\d{1,2}:\d{2}$/.test(t.trim())){toast("Format jam salah (contoh 02:00)");return;}
  haptic();toast("Ngasih izin…");
  try{
    const r=await api("/api/snooze",{method:"POST",body:JSON.stringify({until:t.trim()})});
    if(r.msg)toast(r.msg); setTimeout(refresh,500);
  }catch(e){if(e.message!=="unauthorized")toast("Gagal — Mac nyala & sejaringan?");}
}
async function changePin(){
  const p=prompt("PIN rahasia baru (minimal 4 angka).\nCuma kamu yang tau — suami ga bisa lihat.");
  if(!p)return; haptic();
  try{
    const r=await api("/api/set_pin",{method:"POST",body:JSON.stringify({new_pin:p})});
    toast(r.ok?(r.msg||"PIN diganti"):(r.error||"Gagal"));
  }catch(e){if(e.message!=="unauthorized")toast("Gagal ganti PIN");}
}
async function refresh(){
  try{
    const s=await api("/api/status");
    const card=$("statusCard"),ring=$("ring"),st=$("statusText"),box=$("metaBox");
    $("pinWarn").classList.toggle("hidden",!s.pinIsDefault);
    if(s.locked){
      card.className="status locked";ring.innerHTML=icon("i-moon");
      st.textContent={force:"Lagi kamu tidurkan",bedtime:"Jam tidur",fatigue:"Istirahat mata"}[s.lockKind]||"Terkunci";
      box.innerHTML=`<div class="clock">${s.now}</div>`;
    }else if(s.snoozed){
      card.className="status snooze";ring.innerHTML=icon("i-stars");st.textContent="Diizinin begadang";
      box.innerHTML=`<div class="snoozebox"><div class="u">${s.snoozedUntil||""}</div>`+
                    (s.snoozedRemaining?`<div class="r">${s.snoozedRemaining}</div>`:``)+`</div>`;
    }else{
      card.className="status open";ring.innerHTML=icon("i-sun");st.textContent="Layar terbuka";
      box.innerHTML=`<div class="clock">${s.now}</div><div class="winline">jam tidur · ${s.window}</div>`;
    }
  }catch(e){}
}
if(token){show("main");refresh();startPolling();}else show("pair");
</script>
</body>
</html>
